name: Release signed APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release tag / version (e.g. v1.0.0). Leave empty to use versionName from Gradle."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & publish signed release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "Missing secret SIGNING_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/zensposed-release.jks"
          ls -la "$GITHUB_WORKSPACE/zensposed-release.jks"

      - name: Assemble signed release
        env:
          ZENSPOSED_STORE_FILE: ${{ github.workspace }}/zensposed-release.jks
          ZENSPOSED_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          ZENSPOSED_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          ZENSPOSED_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(ls app/build/outputs/apk/release/*-release.apk | head -n 1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found $APK"
          # Confirm APK is signed
          "$JAVA_HOME/bin/jarsigner" -verify -verbose -certs "$APK" | head -n 20

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zensposed-release
          path: app/build/outputs/apk/release/*-release.apk
          if-no-files-found: error

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            TAG="${{ inputs.version_name }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(grep -E 'versionName\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ZenSposed ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
